<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة حمص | منصة الرندرة الذكية</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="syria-top-bar"></div>

    <header class="homs-header">
        <div class="header-content">
            <img src="https://upload.wikimedia.org/wikipedia/ar/0/0e/Homs_University_Logo.png" alt="شعار جامعة حمص" class="uni-logo">
            <div class="titles">
                <h1>الجمهورية العربية السورية</h1>
                <h2>جامعة حمص - كلية الهندسة المعمارية</h2>
                <h3>مختبر الذكاء الاصطناعي (Nano Banana)</h3>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="render-box">
            <div class="input-group">
                <label>أدخل الوصف المعماري للمشروع:</label>
                <textarea id="promptInput" placeholder="مثلاً: فيلا مودرن في حمص، واجهات حجرية، إضاءة نهارية..."></textarea>
            </div>
            
            <button id="generateBtn" class="btn-syria">
                <span>توليد الرندر الآن</span>
            </button>

            <div id="resultContainer" class="result-area">
                <p class="status-msg">انتظار إدخال البيانات...</p>
            </div>
        </section>
    </main>

    <footer class="homs-footer">
        <p>تم التطوير بواسطة م. يزن - كلية الهندسة المعمارية - 2024</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
