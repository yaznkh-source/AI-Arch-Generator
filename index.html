<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة حمص - رندرة الذكاء الاصطناعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="syrian-top-bar"></div>
    
    <header class="homs-header">
        <img src="https://upload.wikimedia.org/wikipedia/ar/0/0e/Homs_University_Logo.png" class="uni-logo">
        <div class="titles">
            <h1>الجمهورية العربية السورية</h1>
            <h2>جامعة حمص - كلية الهندسة المعمارية</h2>
            <p>مختبر نانو بنانا للرندرة الذكية</p>
        </div>
    </header>

    <div class="main-container">
        <div class="render-card">
            <label>وصف المشروع المعماري:</label>
            <textarea id="promptInput" placeholder="اكتب وصفك هنا (بالإنكليزية لأفضل نتيجة)..."></textarea>
            <button id="generateBtn" class="btn-generate">بـدء الـرنـدرة</button>
        </div>
        
        <div id="resultContainer">
            <p id="statusText">بانتظار الأوامر...</p>
        </div>
    </div>

    <footer>
        <p>جميع الحقوق محفوظة - جامعة حمص © 2024</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
